apiVersion: v1
kind: Pod
metadata:
  name: login-app-emptydir-volume
  labels:
    app: login-app
spec:
  volumes:
    - name: login-shared-storage
      emptyDir: {}

    - name: nginx-cache
      emptyDir: {}

    - name: nginx-run
      emptyDir: {}

  containers:
  - name: myapp
    image: prchekuri/login-2514:poornima

    securityContext:
      runAsUser: 1000
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true

    volumeMounts:
      - name: login-shared-storage
        mountPath: /tmp/conta

      - name: nginx-cache
        mountPath: /var/cache/nginx

      - name: nginx-run
        mountPath: /var/run

    ports:
      - containerPort: 80