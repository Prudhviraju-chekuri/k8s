apiVersion: v1
kind: Pod
metadata:
  name: login-pod
  labels:
    app: login-app
spec:
  volumes:
    - name: login-pvc-volume
      persistentVolumeClaim:
        claimName: login-pvc
  containers:
  - name: login-app-cont
    image: prchekuri/login-2514:poornima
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        memory: "256Mi"
        cpu: "300m"
    volumeMounts:
    - name: login-pvc-volume
      mountPath:  /tmp/conta
    lifecycle:
      postStart:
        exec:
          command: ["sh", "-c", "echo container started >> /tmp/conta/start.log"]
      preStop:
        exec:
          command: ["sh", "-c", "echo container stopped >> /tmp/conta/stop.log"]
    ports:
      - containerPort: 80