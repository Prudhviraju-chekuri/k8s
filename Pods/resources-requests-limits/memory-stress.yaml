apiVersion: v1
kind: Pod
metadata:
  name: mem-stress
spec:
  nodeName: <PASTE_NODE_NAME_HERE>
  containers:
  - name: stress
    image: polinux/stress
    resources:
      requests:
        memory: "1Gi"
      limits:
        memory: "2Gi"
    command: ["stress"]
    args: ["--vm", "1", "--vm-bytes", "1800M", "--vm-hang", "1"]