apiVersion: v1
kind: Pod
metadata:
  name: login-pod
  labels:
    app: login-app
spec:
  containers:
  - name: login-app
    image: prchekuri/login-2514:poornima
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        memory: "256Mi"
        cpu: "300m"
    readinessProbe:
      httpGet:
        path: /healthy
        port: 80
      initialDelaySeconds: 5
      periodSeconds: 5
      failureThreshold: 3

    ports:
      - containerPort: 80
      
