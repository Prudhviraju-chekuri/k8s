apiVersion: v1
kind: Pod
metadata:
  name: login-pod
  labels:
    app: login-app
spec:
  containers:
  - name: login-app
    image: prchekuri/login-2514:poornima
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        memory: "256Mi"
        cpu: "300m"
    envFrom:
      - configMapRef:
          name: login-config
      - secretRef:
          name: login-secret
    env:
      - name: ENV
        valueFrom:
          configMapKeyRef:
            name: login-config
            key: APP_MODE
      - name: LOG
        valueFrom:
          configMapKeyRef:
            name: login-config
            key:  LOG_LEVEL
      - name: DATABASE_PASSWORD
        valueFrom:
          secretKeyRef:
            name: login-secret
            key: DB_PASSWORD1
      - name: POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name
      - name: POD_NAMESPACE
        valueFrom:
          fieldRef:
            fieldPath: metadata.namespace
      - name: POD_NODENAME
        valueFrom:
          fieldRef:
            fieldPath: spec.nodeName
      - name: POD_IP
        valueFrom:
          fieldRef:
            fieldPath: status.podIP

    ports:
      - containerPort: 80